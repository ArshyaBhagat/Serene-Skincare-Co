
<html><style>
    /* General Styles */
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    img {
        max-width: 100%;
        height: auto;
    }

    /* Landing Page */
    .landing-page {
        position: relative;
        text-align: center;
        color: white;
    }

    .landing-image {
        width: 100%;
        height: auto;
    }

    .cancel-button {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 10px 20px;
        background-color: red;
        color: white;
        border: none;
        cursor: pointer;
    }

    /* Tagline and Paragraph Section */
    .intro {
        text-align: center;
        padding: 50px 20px;
        background-color: #f4f4f4;
    }

    .tagline {
        font-size: 2.5em;
        margin-bottom: 20px;
    }

    .intro-paragraph {
        font-size: 1.2em;
        color: #555;
    }

    /* Image Slider */
    .slider {
        position: relative;
        overflow: hidden;
        width: 100%;
        height: 400px;
    }

    .slides {
        display: flex;
        transition: transform 0.5s ease-in-out;
    }

    .slides img {
        width: 100%;
        height: auto;
    }

    /* Sector Cards */
    .sectors {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        padding: 50px 20px;
        background-color: #fff;
    }

    .sector-card {
        flex: 1 1 calc(33.333% - 20px);
        margin: 10px;
        padding: 20px;
        background-color: #eaeaea;
        text-align: center;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* Footer */
    footer {
        text-align: center;
        padding: 20px;
        background-color: #333;
        color: white;
    }
</style>
</html>
